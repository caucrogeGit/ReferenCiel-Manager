{% if pagination.nb_pages > 1 %}
<div class="flex items-center gap-2 mt-4 text-sm">
    {% if pagination.has_prev %}
    <a href="?page={{ pagination.page - 1 }}{% if pagination.q %}&amp;q={{ pagination.q | urlencode }}{% endif %}{% if pagination.sort %}&amp;sort={{ pagination.sort | urlencode }}&amp;direction={{ pagination.direction }}{% endif %}{% for key, val in pagination.filters.items() %}{% if val is not none and val != '' %}&amp;{{ key }}={{ val | urlencode }}{% endif %}{% endfor %}"
       hx-get="?page={{ pagination.page - 1 }}{% if pagination.q %}&amp;q={{ pagination.q | urlencode }}{% endif %}{% if pagination.sort %}&amp;sort={{ pagination.sort | urlencode }}&amp;direction={{ pagination.direction }}{% endif %}{% for key, val in pagination.filters.items() %}{% if val is not none and val != '' %}&amp;{{ key }}={{ val | urlencode }}{% endif %}{% endfor %}" hx-target="#crud-results" hx-swap="innerHTML" hx-push-url="true"
       class="px-3 py-1.5 bg-white border border-gray-200 rounded hover:bg-gray-50">← Préc.</a>
    {% endif %}
    <span class="text-gray-500">Page {{ pagination.page }} / {{ pagination.nb_pages }}</span>
    {% if pagination.has_next %}
    <a href="?page={{ pagination.page + 1 }}{% if pagination.q %}&amp;q={{ pagination.q | urlencode }}{% endif %}{% if pagination.sort %}&amp;sort={{ pagination.sort | urlencode }}&amp;direction={{ pagination.direction }}{% endif %}{% for key, val in pagination.filters.items() %}{% if val is not none and val != '' %}&amp;{{ key }}={{ val | urlencode }}{% endif %}{% endfor %}"
       hx-get="?page={{ pagination.page + 1 }}{% if pagination.q %}&amp;q={{ pagination.q | urlencode }}{% endif %}{% if pagination.sort %}&amp;sort={{ pagination.sort | urlencode }}&amp;direction={{ pagination.direction }}{% endif %}{% for key, val in pagination.filters.items() %}{% if val is not none and val != '' %}&amp;{{ key }}={{ val | urlencode }}{% endif %}{% endfor %}" hx-target="#crud-results" hx-swap="innerHTML" hx-push-url="true"
       class="px-3 py-1.5 bg-white border border-gray-200 rounded hover:bg-gray-50">Suiv. →</a>
    {% endif %}
</div>
{% endif %}
