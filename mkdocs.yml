      - Retour 001 — Conformité du squelette: banc-essai/retour-001-conformite-squelette.md
      - Retour 002 — Commande skeleton:upgrade: banc-essai/retour-002-commande-skeleton-upgrade.md
      - Retour 003 — forge_migrations & provisioning manuel: banc-essai/retour-003-forge-migrations-provisioning-manuel.md
