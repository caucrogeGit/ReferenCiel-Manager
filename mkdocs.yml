site_name: RéférenCiel Manager
site_description: Application métier pédagogique persistée construite avec Forge
site_author: Roger Lequette
repo_name: caucrogeGit/ReferenCiel-Manager
repo_url: https://github.com/caucrogeGit/ReferenCiel-Manager
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  language: fr
  features:
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.tooltips
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: light blue
      toggle:
        icon: material/weather-night
        name: Passer en mode sombre
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: light blue
      toggle:
        icon: material/weather-sunny
        name: Passer en mode clair

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  - glightbox

nav:
  - Accueil: index.md
  - Cadrage:
      - Instructions (prioritaire): cadrage/instructions.md
      - Cadre du projet: cadrage/cadre-projet-referenciel-manager.md
  - Décisions (ADR):
      - Vue d'ensemble: adr/index.md
      - Gabarit d'ADR: adr/000-template.md
      - ADR-001 — Adopter Forge: adr/001-adopter-forge.md
      - ADR-002 — JSON canonique & persistance: adr/002-json-canonique-et-persistance-applicative.md
      - ADR-003 — Architecture Forge: adr/003-architecture-applicative-forge.md
      - ADR-004 — Backend MariaDB: adr/004-backend-base-de-donnees-mariadb.md
      - ADR-005 — Qualité, doc mkdocs & banc d'essai: adr/005-standard-qualite-documentation-mkdocs-banc-essai.md
      - ADR-006 — Stratégie de test: adr/006-strategie-de-test.md
      - ADR-007 — Typage Python strict: adr/007-typage-python-strict.md
      - ADR-008 — Import JSON canonique par upload admin: adr/008-import-json-canonique-par-upload-admin.md
      - ADR-009 — Montée de squelette Forge en place: adr/009-montee-squelette-forge-en-place.md
  - Trajectoire:
      - Roadmap: roadmap/roadmap-referenciel-manager.md
      - Tickets: tickets/README.md
      - Ticket 02 — Contrat JSON canonique: tickets/ticket-02-contrat-json-canonique.md
  - Spécifications:
      - JSON canonique: specs/json-canonique/README.md
      - Contrat — référentiel niveau-classe: specs/json-canonique/contrat-referentiel-niveau-classe.md
      - Contrat — Starter Welcome: specs/json-canonique/contrat-starter-welcome.md
      - Dictionnaire — référentiel niveau-classe: specs/data-dictionary/dictionnaire-referentiel-niveau-classe.md
      - Dictionnaire — socle scolaire: specs/data-dictionary/dictionnaire-socle-scolaire.md
      - Dictionnaire — Starter Welcome: specs/data-dictionary/dictionnaire-starter-welcome.md
      - Registre des sources: specs/json-canonique/registre-des-sources.md
      - Trace — JSON canonique CIEL 2TNE: specs/json-canonique/traces/trace-creation-json-canonique-ciel-2tne.md
      - Capitalisation — fichier .scpro CPRO: specs/json-canonique/traces/capitalisation-fichier-scpro-cpro.md
  - Procédures:
      - Montée de squelette Forge: procedures/montee-squelette-forge.md
  - Banc d'essai (retours Forge):
      - Vue d'ensemble: banc-essai/README.md
      - Retour 001 — Conformité du squelette: banc-essai/retour-001-conformite-squelette.md
      - Retour 002 — Commande skeleton:upgrade: banc-essai/retour-002-commande-skeleton-upgrade.md
      - Retour 003 — forge_migrations & provisioning manuel: banc-essai/retour-003-forge-migrations-provisioning-manuel.md
      - Retour 004 — Code généré & portes qualité: banc-essai/retour-004-code-genere-non-conforme-portes-qualite.md
