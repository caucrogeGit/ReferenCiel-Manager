site_name: RéférenCiel Manager
site_description: Application métier pédagogique persistée construite avec Forge
site_author: Roger Lequette
repo_name: caucrogeGit/ReferenCiel-Manager
repo_url: https://github.com/caucrogeGit/ReferenCiel-Manager
edit_uri: edit/main/docs/

docs_dir: docs
site_dir: site

theme:
  name: material
  language: fr
  features:
    - navigation.sections
    - navigation.top
    - navigation.indexes
    - content.code.copy
    - content.tooltips
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: light blue
      toggle:
        icon: material/weather-night
        name: Passer en mode sombre
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: light blue
      toggle:
        icon: material/weather-sunny
        name: Passer en mode clair

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

plugins:
  - search
  - glightbox

nav:
  - Accueil: index.md
  - Journal de progression: journal-de-progression.md
  - Cadrage:
      - Instructions (prioritaire): cadrage/instructions.md
      - Cadre du projet: cadrage/cadre-projet-referenciel-manager.md
  - Décisions (ADR):
      - Vue d'ensemble: adr/index.md
      - Gabarit d'ADR: adr/000-template.md
      - ADR-001 — Adopter Forge: adr/001-adopter-forge.md
      - ADR-002 — JSON canonique & persistance: adr/002-json-canonique-et-persistance-applicative.md
      - ADR-003 — Architecture Forge: adr/003-architecture-applicative-forge.md
      - ADR-004 — Backend MariaDB: adr/004-backend-base-de-donnees-mariadb.md
      - ADR-005 — Qualité, doc mkdocs & banc d'essai: adr/005-standard-qualite-documentation-mkdocs-banc-essai.md
      - ADR-006 — Stratégie de test: adr/006-strategie-de-test.md
      - ADR-007 — Typage Python strict: adr/007-typage-python-strict.md
      - ADR-008 — Import JSON canonique par upload admin: adr/008-import-json-canonique-par-upload-admin.md
      - ADR-009 — Montée de squelette Forge en place: adr/009-montee-squelette-forge-en-place.md
      - ADR-010 — Importeur référentiel (upsert, best-effort): adr/010-importeur-referentiel-upsert-best-effort.md
  - Trajectoire:
