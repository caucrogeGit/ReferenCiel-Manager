# Configuration d'outillage du projet (pas un paquet distribuable).
# Standard aligné sur Forge : typage statique strict (ADR-007 / Forge ADR-036).

[tool.pyright]
# Typage vérifié sur le code éditable du projet (mvc, optins) et les tests. Le
# mode strict est activé fichier par fichier via le marqueur `# pyright: strict`
# en tête, comme le fait le cœur de Forge : éditeur, ligne de commande et CI
# vérifient exactement la même chose.
pythonVersion = "3.12"
venvPath = "."
venv = ".venv"
include = [
  "mvc",
  "optins",
  "conftest.py",
  "tests",
]
exclude = [
  "**/__pycache__",
  ".venv",
  "site",
  # *_base.py : générés/régénérables par Forge (règle d'or CLAUDE.md). Ce n'est
  # pas notre code, on ne l'édite pas → hors cliquet strict (ADR-007 : strict sur
  # le code que NOUS produisons). Le jumeau manuel (ex. annee_scolaire.py) reste
  # inclus. Voir banc-essai/retour-004 (code généré non strict-clean).
  "**/*_base.py",
]

[tool.ruff]
# Aligné sur la config ruff de Forge (même standard, y compris pour le squelette généré).
target-version = "py312"
line-length = 120
exclude = [".venv", "site"]

[tool.ruff.lint]
select = ["E", "F"]
ignore = [
  "E501",  # line-too-long — géré séparément
  "E741",  # ambiguous-variable-name — intentionnel
  "E402",  # module-import-not-at-top — intentionnel dans app.py / scripts générés
]

[tool.ruff.lint.per-file-ignores]
# Les __init__.py ré-exportent l'API du paquet (dont ceux générés par Forge pour
# les entités). Le F401 « imported but unused » y est un faux positif attendu.
# Voir banc-essai/retour-004 (code généré non conforme aux portes qualité).
"**/__init__.py" = ["F401"]
